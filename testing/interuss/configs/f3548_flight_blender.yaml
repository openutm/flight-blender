# uss_qualifier configuration: ASTM F3548-21 (Strategic Conflict Detection)
# Tests Flight Blender as a flight planner against the ASTM F3548-21 standard.
#
# Key changes from the dev/f3548_self_contained.yaml baseline:
#   - flight_blender replaces uss1_core as the system under test
#   - stop_fast: false so ALL tests run and we always get a full report
#   - no validation block so uss_qualifier always exits 0 regardless of failures
#
# Required environment variables (passed to `docker run`):
#   AUTH_SPEC  - e.g. DummyOAuth(http://oauth.authority.localutm:8085/token,flight-blender.localutm)
#   AUTH_SPEC_2 - e.g. DummyOAuth(http://oauth.authority.localutm:8085/token,uss2)
#
# Run with:
#   docker run --rm \
#     --network interop_ecosystem_network \
#     -w /app/monitoring/uss_qualifier \
#     -e AUTH_SPEC="..." \
#     -e AUTH_SPEC_2="..." \
#     -v "$(pwd)/testing/interuss/configs:/configs" \
#     -v "$(pwd)/testing/interuss/output:/app/monitoring/uss_qualifier/output" \
#     interuss/monitoring:v0.30.0 \
#     uv run main.py \
#       --config "file:///configs/f3548_flight_blender.yaml" \
#       --report "output/f3548_report.json"

$content_schema: monitoring/uss_qualifier/configurations/configuration/USSQualifierConfiguration.json

v1:
  test_run:
    action:
      test_suite:
        suite_type: suites.astm.utm.f3548_21
        resources:
          id_generator: id_generator
          utm_client_identity: utm_client_identity
          test_env_version_providers: test_env_version_providers
          prod_env_version_providers: prod_env_version_providers
          flight_planners: flight_planners
          flight_planners_to_clear: flight_planners
          conflicting_flights: conflicting_flights
          priority_preemption_flights: conflicting_flights
          invalid_flight_intents: invalid_flight_intents
          non_conflicting_flights: non_conflicting_flights
          dss: dss
          dss_instances: dss_instances
          mock_uss: mock_uss
          utm_auth: utm_auth
          second_utm_auth: second_utm_auth
          planning_area: planning_area
          problematically_big_area: problematically_big_area

    non_baseline_inputs:
      - v1.test_run.resources.resource_declarations.utm_auth
      - v1.test_run.resources.resource_declarations.second_utm_auth
      - v1.test_run.resources.resource_declarations.test_env_version_providers
      - v1.test_run.resources.resource_declarations.prod_env_version_providers
      - v1.test_run.resources.resource_declarations.flight_planners
      - v1.test_run.resources.resource_declarations.dss
      - v1.test_run.resources.resource_declarations.dss_instances
      - v1.test_run.resources.resource_declarations.mock_uss

    resources:
      resource_declarations:

        # =================================
        # ========== Environment ==========
        # =================================

        utm_auth:
          resource_type: resources.communications.AuthAdapterResource
          specification:
            environment_variable_containing_auth_spec: AUTH_SPEC
            scopes_authorized:
              - interuss.flight_planning.direct_automated_test
              - interuss.flight_planning.plan
              - interuss.versioning.read_system_versions
              - utm.strategic_coordination
              - utm.availability_arbitration
              - utm.constraint_management
              - ""

        second_utm_auth:
          resource_type: resources.communications.AuthAdapterResource
          specification:
            environment_variable_containing_auth_spec: AUTH_SPEC_2
            scopes_authorized:
              - utm.strategic_coordination

        # Version providers — Flight Blender does not yet expose /versioning,
        # so these checks will be skipped/failed but won't stop the run.
        test_env_version_providers:
          resource_type: resources.versioning.VersionProvidersResource
          dependencies:
            auth_adapter: utm_auth
          specification:
            instances:
              - participant_id: flight_blender
                interuss:
                  base_url: http://flight-blender.localutm:8000/versioning
              - participant_id: uss2_core
                interuss:
                  base_url: http://scdsc.uss2.localutm/versioning

        prod_env_version_providers:
          resource_type: resources.versioning.VersionProvidersResource
          dependencies:
            auth_adapter: utm_auth
          specification:
            instances:
              - participant_id: flight_blender
                interuss:
                  base_url: http://flight-blender.localutm:8000/versioning
              - participant_id: uss2_core
                interuss:
                  base_url: http://scdsc.uss2.localutm/versioning

        # Flight planners under test:
        #   [0] Flight Blender (system under test)
        #   [1] mock_uss_scdsc_b (reference implementation — used as the peer USS)
        flight_planners:
          resource_type: resources.flight_planning.FlightPlannersResource
          dependencies:
            auth_adapter: utm_auth
          specification:
            flight_planners:
              - participant_id: flight_blender
                v1_base_url: http://flight-blender.localutm:8000/scd/flight_planning
              - participant_id: uss2_core
                v1_base_url: http://scdsc.uss2.localutm/flight_planning/v1

        dss:
          resource_type: resources.astm.f3548.v21.DSSInstanceResource
          dependencies:
            auth_adapter: utm_auth
          specification:
            participant_id: uss1_dss
            base_url: http://dss1.uss1.localutm
            supports_ovn_request: true

        dss_instances:
          resource_type: resources.astm.f3548.v21.DSSInstancesResource
          dependencies:
            auth_adapter: utm_auth
          specification:
            dss_instances:
              - participant_id: uss1_dss
                user_participant_ids:
                  - mock_uss
                  - flight_blender
                base_url: http://dss1.uss1.localutm
                supports_ovn_request: true
              - participant_id: uss2_dss
                base_url: http://dss1.uss2.localutm
                supports_ovn_request: true

        mock_uss:
          resource_type: resources.interuss.mock_uss.client.MockUSSResource
          dependencies:
            auth_adapter: utm_auth
          specification:
            participant_id: mock_uss
            mock_uss_base_url: http://scdsc.log.uss6.localutm

        # =================================
        # ========== Baseline =============
        # =================================

        utm_client_identity:
          resource_type: resources.communications.ClientIdentityResource
          dependencies:
            auth_adapter: utm_auth
          specification:
            whoami_audience: localhost
            whoami_scope: utm.strategic_coordination

        id_generator:
          $content_schema: monitoring/uss_qualifier/resources/definitions/ResourceDeclaration.json
          resource_type: resources.interuss.IDGeneratorResource
          dependencies:
            client_identity: utm_client_identity

        planning_area_volume:
          $content_schema: monitoring/uss_qualifier/resources/definitions/ResourceDeclaration.json
          resource_type: resources.VolumeResource
          specification:
            template:
              outline_polygon:
                vertices:
                  - lat: 37.1853
                    lng: -80.6140
                  - lat: 37.2148
                    lng: -80.6140
                  - lat: 37.2148
                    lng: -80.5440
                  - lat: 37.1853
                    lng: -80.5440
              altitude_lower:
                value: 0
                reference: W84
                units: M
              altitude_upper:
                value: 3048
                reference: W84
                units: M

        planning_area:
          $content_schema: monitoring/uss_qualifier/resources/definitions/ResourceDeclaration.json
          resource_type: resources.PlanningAreaResource
          dependencies:
            volume: planning_area_volume
          specification:
            base_url: https://testdummy.interuss.org/interuss/monitoring/uss_qualifier/configurations/dev/f3548_self_contained/planning_area

        problematically_big_area:
          $content_schema: monitoring/uss_qualifier/resources/definitions/ResourceDeclaration.json
          resource_type: resources.VolumeResource
          specification:
            template:
              outline_polygon:
                vertices:
                  - lat: 38
                    lng: -81
                  - lat: 37
                    lng: -81
                  - lat: 37
                    lng: -80
                  - lat: 38
                    lng: -80

        conflicting_flights:
          resource_type: resources.flight_planning.FlightIntentsResource
          specification:
            file:
              path: file://./test_data/flight_intents/standard/conflicting_flights.yaml
            transformations:
              - relative_translation:
                  degrees_north: 32.7181
                  degrees_east: -96.7587
                  meters_up: 93

        invalid_flight_intents:
          resource_type: resources.flight_planning.FlightIntentsResource
          specification:
            intent_collection:
              $ref: test_data.flight_intents.standard.invalid_flight_intents
            transformations:
              - relative_translation:
                  degrees_north: 32.7181
                  degrees_east: -96.7587
                  meters_up: 93

        non_conflicting_flights:
          resource_type: resources.flight_planning.FlightIntentsResource
          specification:
            intent_collection:
              # Module notation resolves from the uss_qualifier working directory
              # (/app/monitoring/uss_qualifier/), so this always works regardless
              # of where the config file is mounted.
              $ref: test_data.flight_intents.standard.non_conflicting
            transformations:
              - relative_translation:
                  degrees_north: 32.7181
                  degrees_east: -96.7587
                  meters_up: 93

    execution:
      # Run ALL tests regardless of failures so we always get a complete report
      stop_fast: false

  artifacts:
    # Raw JSON report written to {output_path}/report.json
    raw_report:
      indent: 2

    # Human-readable HTML report of tested requirements per participant
    tested_requirements:
      - report_name: f3548_requirements
        aggregate_participants:
          flight_blender:
            - flight_blender
            - uss1_dss
          uss2:
            - uss2_core
            - uss2_dss
        requirement_collections:
