name: Dependency Update
on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install script dependencies
        run: pip install tomli-w
      - name: Update dependencies
        run: |
          # 1. Strip all version specifiers from direct deps so uv can upgrade freely.
          # 2. Resolve to latest with uv lock --upgrade.
          # 3. Re-pin every direct dep back to == the version chosen by the resolver.
          python3 - <<'EOF'
          import re
          import subprocess
          import tomllib
          import tomli_w

          PYPROJECT = "pyproject.toml"

          with open(PYPROJECT, "rb") as f:
              data = tomllib.load(f)

          deps = data["project"]["dependencies"]
          dev_deps = data.get("tool", {}).get("uv", {}).get("dev-dependencies", [])

          def strip_version(spec: str) -> str:
              """Remove any version constraint, keeping only the package name (+ extras)."""
              return re.split(r"\s*[><=!~;]|\s*\[", spec)[0].strip()

          # Strip constraints so uv can resolve freely
          data["project"]["dependencies"] = [strip_version(d) for d in deps]
          if dev_deps:
              data["tool"]["uv"]["dev-dependencies"] = [strip_version(d) for d in dev_deps]

          with open(PYPROJECT, "wb") as f:
              tomli_w.dump(data, f)

          # Resolve to latest
          subprocess.run(["uv", "lock", "--upgrade"], check=True)

          # Parse the resolved versions from uv.lock
          with open("uv.lock", "rb") as f:
              lock = tomllib.load(f)

          resolved = {
              pkg["name"].lower(): pkg["version"]
              for pkg in lock.get("package", [])
          }

          def pin_version(spec: str) -> str:
              """Replace a bare package name with name==<resolved_version>."""
              name = strip_version(spec)
              version = resolved.get(name.lower())
              return f"{name}=={version}" if version else name

          # Re-read (uv may have modified pyproject.toml during lock)
          with open(PYPROJECT, "rb") as f:
              data = tomllib.load(f)

          data["project"]["dependencies"] = [pin_version(d) for d in data["project"]["dependencies"]]
          if dev_deps:
              data["tool"]["uv"]["dev-dependencies"] = [
                  pin_version(d) for d in data["tool"]["uv"]["dev-dependencies"]
              ]

          with open(PYPROJECT, "wb") as f:
              tomli_w.dump(data, f)

          print("pyproject.toml re-pinned with == specifiers.")
          EOF

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet pyproject.toml uv.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update Python dependencies"
          title: "chore: update Python dependencies"
          body: |
            Automated dependency update via `uv lock --upgrade`.

            Both `pyproject.toml` (re-pinned with `==`) and `uv.lock` are updated.
            Please review the changes and verify CI passes before merging.
          branch: deps/uv-lock-upgrade
          delete-branch: true
