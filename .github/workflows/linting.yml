        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --dev
      - name: Run codespell
        id: codespell
        run: |
          set +e
          uv run codespell 2>&1 | tee codespell-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e
      - name: Write Job Summary
        if: always()
        run: |
          echo "## Codespell results" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.codespell.outputs.exit_code }}" = "0" ]; then
