name: Linting
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --dev
      - name: Run ruff
        id: ruff
        run: |
          set +e
          uv run ruff check --output-format github . 2>&1 | tee ruff-output.txt
          check_exit=$?
          uv run ruff format --check . 2>&1 | tee -a ruff-output.txt
          format_exit=$?
          if [ "$check_exit" -ne 0 ] || [ "$format_exit" -ne 0 ]; then
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
          else
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
          fi
          set -e
      - name: Write Job Summary
        if: always()
        run: |
          echo "## Ruff results" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.ruff.outputs.exit_code }}" = "0" ]; then
            echo ":white_check_mark: No issues found." >> "$GITHUB_STEP_SUMMARY"
          else
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat ruff-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Comment on PR
        if: always() && github.event_name == 'pull_request' && steps.ruff.outputs.exit_code != '0'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('ruff-output.txt', 'utf8').trim();
            let body = '## :mag: Ruff lint results\n\n';
            body += '<details><summary>Show details</summary>\n\n';
            body += '```\n' + output + '\n```\n';
            body += '</details>';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(':mag: Ruff lint results'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
      - name: Remove PR comment if passing
        if: always() && github.event_name == 'pull_request' && steps.ruff.outputs.exit_code == '0'
        uses: actions/github-script@v8
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(':mag: Ruff lint results'));
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }
      - name: Fail if errors found
        if: steps.ruff.outputs.exit_code != '0'
        run: exit 1
  codespell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
