name: InterUSS Qualification

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      suite:
        description: "InterUSS suite to run"
        type: choice
        options:
          - both
          - f3548
          - netrid
        default: both
  schedule:
    - cron: "0 3 * * 1"

concurrency:
  group: interuss-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  interuss-qualification:
    name: InterUSS uss_qualifier
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      INTERUSS_SUITE: ${{ github.event_name == 'workflow_dispatch' && inputs.suite || 'both' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache interuss/monitoring clone
        uses: actions/cache@v4
        with:
          path: /tmp/interuss-monitoring
          key: interuss-monitoring-v0.30.0

      - name: Run InterUSS qualification
        env:
          INTERUSS_SUMMARY_FILE: testing/interuss/output/interuss-summary.md
        run: |
          args=(--clean)
          if [ "${INTERUSS_SUITE}" != "both" ]; then
            args+=(--suite "${INTERUSS_SUITE}")
          fi
          bash testing/interuss/scripts/run_interuss_tests.sh "${args[@]}"

      - name: Update PR report comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { upsertPrComment } = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/pr-comment.js`);
            const marker = '<!-- interuss-qualification-report -->';
            const summaryPath = 'testing/interuss/output/interuss-summary.md';
            const summary = fs.existsSync(summaryPath)
              ? fs.readFileSync(summaryPath, 'utf8').trim()
              : '_No InterUSS report summary was generated._';
            const body = [
              marker,
              '# InterUSS Qualification Report',
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              summary,
            ].join('\n');

            await upsertPrComment({ github, context, marker, body });

      - name: Generate InterUSS result badges
        if: always()
        run: |
          mkdir -p badges
          python3 <<'PY'
          import json
          from pathlib import Path

          BADGES = [
              (
                  Path("testing/interuss/output/f3548/report.json"),
                  Path("badges/interuss-f3548.svg"),
                  "ASTM F3548-21",
              ),
              (
                  Path("testing/interuss/output/netrid_v22a/report.json"),
                  Path("badges/interuss-f3411.svg"),
                  "ASTM F3411-22a",
              ),
          ]

          def suite_success(report_path: Path) -> bool | None:
              if not report_path.exists():
                  return None
              data = json.loads(report_path.read_text())
              return data.get("test_run", {}).get("test_suite", {}).get("successful")

          def write_badge(path: Path, label: str, result: bool | None) -> None:
              if result is True:
                  message = "passing"
                  color = "#4c1"
              elif result is False:
                  message = "failing"
                  color = "#e05d44"
              else:
                  message = "unknown"
                  color = "#9f9f9f"

              label_width = max(88, len(label) * 7 + 12)
              message_width = max(56, len(message) * 8 + 12)
              width = label_width + message_width
              x_label = label_width / 2
              x_message = label_width + message_width / 2

              svg = f"""<svg xmlns="http://www.w3.org/2000/svg" width="{width}" height="20" role="img" aria-label="{label}: {message}">
          <title>{label}: {message}</title>
          <linearGradient id="s" x2="0" y2="100%">
            <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
            <stop offset="1" stop-opacity=".1"/>
          </linearGradient>
          <clipPath id="r">
            <rect width="{width}" height="20" rx="3" fill="#fff"/>
          </clipPath>
          <g clip-path="url(#r)">
            <rect width="{label_width}" height="20" fill="#555"/>
            <rect x="{label_width}" width="{message_width}" height="20" fill="{color}"/>
            <rect width="{width}" height="20" fill="url(#s)"/>
          </g>
          <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
            <text aria-hidden="true" x="{x_label * 10:.0f}" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="{(label_width - 12) * 10:.0f}">{label}</text>
            <text x="{x_label * 10:.0f}" y="140" transform="scale(.1)" textLength="{(label_width - 12) * 10:.0f}">{label}</text>
            <text aria-hidden="true" x="{x_message * 10:.0f}" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="{(message_width - 12) * 10:.0f}">{message}</text>
            <text x="{x_message * 10:.0f}" y="140" transform="scale(.1)" textLength="{(message_width - 12) * 10:.0f}">{message}</text>
          </g>
          </svg>
          """
              path.write_text(svg)

          for report_path, badge_path, label in BADGES:
              write_badge(badge_path, label, suite_success(report_path))
          PY

      - name: Upload InterUSS result badges
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interuss-result-badges
          path: |
            badges/interuss-f3548.svg
            badges/interuss-f3411.svg
          retention-days: 30

      - name: Commit InterUSS result badges
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && hashFiles('testing/interuss/output/f3548/report.json') != '' && hashFiles('testing/interuss/output/netrid_v22a/report.json') != ''
        run: |
          if [ -z "$(git status --porcelain badges/interuss-f3548.svg badges/interuss-f3411.svg)" ]; then
            echo "InterUSS result badges unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/interuss-f3548.svg badges/interuss-f3411.svg
          git commit -m "Update InterUSS result badges"
          git push

      - name: Upload qualification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interuss-qualification-reports-${{ github.run_number }}
          path: |
            testing/interuss/output/f3548/report.json
            testing/interuss/output/f3548/f3548_requirements/
            testing/interuss/output/f3548/sequence/
            testing/interuss/output/netrid_v22a/report.json
            testing/interuss/output/netrid_v22a/netrid_v22a_requirements/
            testing/interuss/output/netrid_v22a/sequence/
          if-no-files-found: warn
          retention-days: 30
