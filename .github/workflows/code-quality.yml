name: Code Quality

on:
  pull_request:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///:memory:"
      BYPASS_AUTH_TOKEN_VERIFICATION: "1"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --dev
      - name: Run tests with coverage
        id: coverage
        run: |
          set +e
          uv run pytest --cov --cov-report=term-missing --cov-report=json --cov-report=html --tb=short -q 2>&1 | tee coverage-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e
      - name: Extract coverage metrics
        if: always()
        id: metrics
        run: |
          if [ -f coverage.json ]; then
            total=$(python3 -c "import json; print(json.load(open('coverage.json'))['totals']['percent_covered_display'])")
            covered=$(python3 -c "import json; print(json.load(open('coverage.json'))['totals']['covered_lines'])")
            total_lines=$(python3 -c "import json; print(json.load(open('coverage.json'))['totals']['num_statements'])")
            echo "total_coverage=$total" >> "$GITHUB_OUTPUT"
            echo "covered_lines=$covered" >> "$GITHUB_OUTPUT"
            echo "total_lines=$total_lines" >> "$GITHUB_OUTPUT"
          else
            echo "total_coverage=N/A" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate quality badges
        if: always()
        env:
          COVERAGE_EXIT_CODE: ${{ steps.coverage.outputs.exit_code }}
        run: |
          mkdir -p badges
          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          def write_badge(path: Path, label: str, message: str, color: str) -> None:
              label_width = max(68, len(label) * 7 + 12)
              message_width = max(48, len(message) * 8 + 12)
              width = label_width + message_width
              x_label = label_width / 2
              x_message = label_width + message_width / 2

              svg = f"""<svg xmlns="http://www.w3.org/2000/svg" width="{width}" height="20" role="img" aria-label="{label}: {message}">
          <title>{label}: {message}</title>
          <linearGradient id="s" x2="0" y2="100%">
            <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
            <stop offset="1" stop-opacity=".1"/>
          </linearGradient>
          <clipPath id="r">
            <rect width="{width}" height="20" rx="3" fill="#fff"/>
          </clipPath>
          <g clip-path="url(#r)">
            <rect width="{label_width}" height="20" fill="#555"/>
            <rect x="{label_width}" width="{message_width}" height="20" fill="{color}"/>
            <rect width="{width}" height="20" fill="url(#s)"/>
          </g>
          <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
            <text aria-hidden="true" x="{x_label * 10:.0f}" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="{(label_width - 12) * 10:.0f}">{label}</text>
            <text x="{x_label * 10:.0f}" y="140" transform="scale(.1)" textLength="{(label_width - 12) * 10:.0f}">{label}</text>
            <text aria-hidden="true" x="{x_message * 10:.0f}" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="{(message_width - 12) * 10:.0f}">{message}</text>
            <text x="{x_message * 10:.0f}" y="140" transform="scale(.1)" textLength="{(message_width - 12) * 10:.0f}">{message}</text>
          </g>
          </svg>
          """
              path.write_text(svg)

          total = None
          coverage_file = Path("coverage.json")
          if coverage_file.exists():
              total = float(json.loads(coverage_file.read_text())["totals"]["percent_covered"])

          if total is None:
              write_badge(Path("badges/coverage.svg"), "coverage", "unknown", "#9f9f9f")
          else:
              color = "#4c1" if total >= 80 else "#dfb317" if total >= 60 else "#e05d44"
              write_badge(Path("badges/coverage.svg"), "coverage", f"{total:.1f}%", color)

          if os.environ.get("COVERAGE_EXIT_CODE") == "0":
              write_badge(Path("badges/code-quality.svg"), "code quality", "passing", "#4c1")
          else:
              write_badge(Path("badges/code-quality.svg"), "code quality", "failing", "#e05d44")
          PY
      - name: Upload quality badges
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-badges
          path: |
            badges/coverage.svg
            badges/code-quality.svg
          retention-days: 14
      - name: Commit quality badges to PR branch
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && steps.coverage.outputs.exit_code == '0' && hashFiles('coverage.json') != ''
        run: |
          if [ -z "$(git status --porcelain badges/coverage.svg badges/code-quality.svg)" ]; then
            echo "Quality badges unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg badges/code-quality.svg
          git commit -m "Update quality badges"
          git push origin HEAD:${{ github.head_ref }}
      - name: Upload HTML coverage report
        if: always() && hashFiles('htmlcov/index.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14
      # - name: Upload coverage to Codecov
      #   if: always() && hashFiles('coverage.json') != ''
      #   uses: codecov/codecov-action@v5
      #   with:
      #     files: coverage.json
      #     flags: unittests
      #     fail_ci_if_error: false
      #     token: ${{ secrets.CODECOV_TOKEN }}
      - name: Write Job Summary
        if: always()
        run: |
          echo "## :bar_chart: Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          TOTAL="${{ steps.metrics.outputs.total_coverage }}"
          if [ "$TOTAL" = "N/A" ]; then
            echo ":warning: Coverage data not available (tests may have failed)." >> "$GITHUB_STEP_SUMMARY"
          else
            COVERED="${{ steps.metrics.outputs.covered_lines }}"
            LINES="${{ steps.metrics.outputs.total_lines }}"
            echo "**Overall coverage: ${TOTAL}%** (${COVERED} / ${LINES} lines)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            # Per-module summary table
            echo "### Per-module coverage" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Module | Coverage |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|----------|" >> "$GITHUB_STEP_SUMMARY"
            python3 -c "
          import json
          data = json.load(open('coverage.json'))
          modules = {}
          for f, info in data.get('files', {}).items():
              parts = f.split('/')
              if len(parts) >= 2 and not f.startswith('tests/'):
                  mod = parts[0]
                  if mod not in modules:
                      modules[mod] = {'covered': 0, 'total': 0}
                  modules[mod]['covered'] += info['summary']['covered_lines']
                  modules[mod]['total'] += info['summary']['num_statements']
          for mod in sorted(modules):
              m = modules[mod]
              pct = round(m['covered'] / m['total'] * 100, 1) if m['total'] > 0 else 0
              icon = ':green_circle:' if pct >= 80 else ':yellow_circle:' if pct >= 50 else ':red_circle:'
              print(f'| {icon} \`{mod}\` | {pct}% |')
          " >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            echo "<details><summary>Full terminal output</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat coverage-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"

            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> :page_facing_up: Download the **HTML report** from the [Artifacts](../actions) section for interactive browsing." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Write Job Summary
        if: always()
        run: |
          echo "## :bar_chart: Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          TOTAL="${{ steps.metrics.outputs.total_coverage }}"
          if [ "$TOTAL" = "N/A" ]; then
            echo ":warning: Coverage data not available (tests may have failed)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Overall coverage: ${TOTAL}%**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Full report</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat coverage-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const { upsertPrComment } = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/pr-comment.js`);
            const marker = ':bar_chart: Test Coverage Report';
            const total = '${{ steps.metrics.outputs.total_coverage }}';
            const exitCode = '${{ steps.coverage.outputs.exit_code }}';

            let body = '## :bar_chart: Test Coverage Report\n\n';

            if (total === 'N/A') {
              body += ':warning: Coverage data not available (tests may have failed).\n';
            } else {
              const pct = parseFloat(total);
              let badge = ':red_circle:';
              if (pct >= 80) badge = ':green_circle:';
              else if (pct >= 60) badge = ':yellow_circle:';
              body += `${badge} **Overall coverage: ${total}%**\n\n`;

              if (fs.existsSync('coverage.json')) {
                const data = JSON.parse(fs.readFileSync('coverage.json', 'utf8'));
                const files = Object.entries(data.files || {})
                  .map(([name, info]) => ({
                    name,
                    cover: info.summary.percent_covered_display,
                    pct: info.summary.percent_covered,
                  }))
                  .filter(f => !f.name.includes('/tests') && !f.name.endsWith('tests.py'))
                  .sort((a, b) => a.pct - b.pct);

                const low = files.filter(f => f.pct < 50).slice(0, 15);
                if (low.length > 0) {
                  body += '<details><summary>Files with lowest coverage (&lt;50%)</summary>\n\n';
                  body += '| File | Coverage |\n|------|----------|\n';
                  for (const f of low) {
                    body += `| \`${f.name}\` | ${f.cover}% |\n`;
                  }
                  body += '\n</details>\n';
                }
              }
            }

            await upsertPrComment({ github, context, marker, body });
      - name: Fail if tests failed
        if: steps.coverage.outputs.exit_code != '0'
        run: exit 1

  complexity:
    name: Code Complexity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install radon
        run: pip install radon
      - name: Run cyclomatic complexity analysis
        id: cc
        run: |
          # Get average complexity
          radon cc . -a -s --exclude ".venv,migrations,tests" 2>&1 | tee cc-full.txt
          AVG=$(tail -1 cc-full.txt | sed 's/.*Average complexity: //')
          echo "average=$AVG" >> "$GITHUB_OUTPUT"

          # Get high-complexity blocks (C and above)
          radon cc . -a -s --exclude ".venv,migrations,tests" -n C 2>&1 | tee cc-high.txt

          # Count high-complexity blocks (lines that start with spaces and have a grade)
          HIGH_COUNT=$(grep -cE '^\s+(F|M|C) ' cc-high.txt || true)
          echo "high_count=$HIGH_COUNT" >> "$GITHUB_OUTPUT"
      - name: Run maintainability index
        id: mi
        run: |
          radon mi . -s --exclude ".venv,migrations,tests" 2>&1 | tee mi-full.txt

          # Count files with low maintainability (C or below)
          LOW_MI=$(grep -cE ' - [CDF] ' mi-full.txt || true)
          echo "low_mi_count=$LOW_MI" >> "$GITHUB_OUTPUT"

          # Extract low-MI files
          grep -E ' - [CDF] ' mi-full.txt > mi-low.txt || true
      - name: Write Job Summary
        if: always()
        run: |
          echo "## :brain: Code Complexity Metrics" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Average cyclomatic complexity:** ${{ steps.cc.outputs.average }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**High-complexity blocks (C+):** ${{ steps.cc.outputs.high_count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Low maintainability files (C-):** ${{ steps.mi.outputs.low_mi_count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          HIGH_COUNT="${{ steps.cc.outputs.high_count }}"
          if [ "$HIGH_COUNT" != "0" ]; then
            echo "<details><summary>High-complexity blocks</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat cc-high.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi

          LOW_MI="${{ steps.mi.outputs.low_mi_count }}"
          if [ "$LOW_MI" != "0" ]; then
            echo "<details><summary>Low maintainability files</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat mi-low.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const { upsertPrComment } = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/pr-comment.js`);
            const marker = ':brain: Code Complexity Report';
            const avg = '${{ steps.cc.outputs.average }}';
            const highCount = parseInt('${{ steps.cc.outputs.high_count }}' || '0');
            const lowMI = parseInt('${{ steps.mi.outputs.low_mi_count }}' || '0');

            let body = '## :brain: Code Complexity Report\n\n';
            body += `**Average cyclomatic complexity:** ${avg}\n`;
            body += `**High-complexity blocks (C+):** ${highCount}\n`;
            body += `**Low maintainability files:** ${lowMI}\n\n`;

            if (highCount > 0 && fs.existsSync('cc-high.txt')) {
              const ccOutput = fs.readFileSync('cc-high.txt', 'utf8').trim();
              body += '<details><summary>High-complexity blocks (grade C and above)</summary>\n\n';
              body += '```\n' + ccOutput + '\n```\n';
              body += '</details>\n\n';
            }

            if (lowMI > 0 && fs.existsSync('mi-low.txt')) {
              const miOutput = fs.readFileSync('mi-low.txt', 'utf8').trim();
              body += '<details><summary>Low maintainability files</summary>\n\n';
              body += '```\n' + miOutput + '\n```\n';
              body += '</details>\n';
            }

            await upsertPrComment({ github, context, marker, body });
